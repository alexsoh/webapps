name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            list_creator/package-lock.json
            log_viewer/package-lock.json
            json_builder/package-lock.json

      - name: Install and build list_creator
        working-directory: list_creator
        run: |
          npm ci
          npm run build

      - name: Install and build log_viewer
        working-directory: log_viewer
        run: |
          npm ci
          npm run build

      - name: Install and build json_builder
        working-directory: json_builder
        run: |
          npm ci
          npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p _site/list_creator _site/log_viewer _site/json_builder
          cp -r list_creator/dist/* _site/list_creator/
          cp -r log_viewer/dist/* _site/log_viewer/
          cp -r json_builder/dist/* _site/json_builder/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
