name: "hawkeye2ha"
version: "0.1.0"
slug: "hawkeye2ha"
description: "Home Assistant dashboard and entity bridge for HawkEye2 cameras"
url: "https://github.com/alexsoh/hawkeye2ha"
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:cctv"
watchdog: "http://[HOST]:[PORT:8099]/health"
map:
  - type: data
stage: experimental
options:
  hawkeye2_url: "http://192.168.1.100"
  hawkeye2_port: 8000
schema:
  hawkeye2_url: str
  hawkeye2_port: "int(1,65535)"
image: "ghcr.io/alexsoh/hawkeye2ha-{arch}"
